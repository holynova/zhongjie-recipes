    const link = e.target.closest('a[href^="#r"]');
    if (!link) return;
    e.preventDefault();
    scrollToRecipe(link.getAttribute('href'));
  });
  
  // Fix initial hash jump after JS-rendered anchors exist
  requestAnimationFrame(() => {
    if (location.hash) scrollToRecipe(location.hash, false);
  });
  
  // Scroll handler
  window.addEventListener('scroll', () => {
    document.getElementById('backTop').classList.toggle('show', window.scrollY > 300);
  });
}

function renderFilterTags() {
  const container = document.getElementById('filterTags');
  container.innerHTML = ALL_TAGS.map(t => {
    const stage = t === '全部' ? 'gen' : 
      (t === '第一周' ? 'w1' : t === '第二周' ? 'w2' : t === '第三周' ? 'w3' : t === '第四周' ? 'w4' : 'gen');
    const cls = t === '全部' ? 'active' : '';
    const bg = stage === 'w1' ? 'w1' : stage === 'w2' ? 'w2' : stage === 'w3' ? 'w3' : stage === 'w4' ? 'w4' : 'gen';
    return `<button class="filter-tag ${cls}" data-tag="${t}" onclick="setTag('${t}', this)">${t}</button>`;
  }).join('');
}

// ── Sorting ──
function getSortedRecipes() {
  let list = RECIPES.filter(r => activeDataset === 'all' || r.source_batch === activeDataset);
  if (activeSort === 'date') {
    list.sort((a,b) => (b.publish_ts || 0) - (a.publish_ts || 0) || b.likes_num - a.likes_num);
  } else if (activeSort === 'likes') {
    list.sort((a,b) => b.likes_num - a.likes_num);
  } else if (activeSort === 'stage') {
    const order = {w1:1, w2:2, w3:3, w4:4};
    list.sort((a,b) => {
      const ao = order[a.stage] || 99;
      const bo = order[b.stage] || 99;
      return ao - bo || b.likes_num - a.likes_num;
    });
  }
  return list;
}

// ── Filtering ──
function applyAllFilters() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.classList.toggle('visible', query.length > 0);
  
  const sorted = getSortedRecipes();
  let visible = [];
  
  sorted.forEach((r, i) => {
    const card = document.getElementById('card-' + i);
    if (!card) return;
    
    let match = true;
    
    // Tag filter
    if (activeTag !== '全部') {
      if (activeTag === '孕期' || activeTag === '减脂' || activeTag === '养生') {
        match = r.stage_label === activeTag;
      } else if (activeTag === '通用') {
        match = r.stage_label === '通用';
      } else {
        match = r.stage_label === activeTag;
      }
    }
    
    // Search filter
    if (match && query) {
      const searchText = (r.title + ' ' + r.stage_label + ' ' + r.ingredients.join(' ')).toLowerCase();
      match = searchText.includes(query);
    }
    
    if (match) {
      card.classList.remove('hidden');
      visible.push(i);
    } else {
      card.classList.add('hidden');
    }
  });
  
  // Update result count
  const countEl = document.getElementById('resultCount');
  if (query || activeTag !== '全部' || activeDataset !== 'all') {
    countEl.textContent = `显示 ${visible.length} / ${getSortedRecipes().length} 道菜谱`;
    countEl.classList.add('visible');
  } else {
    countEl.classList.remove('visible');
  }
  
  // Update index highlights
  updateIndex(visible);
  updateSummary(visible.length, query);
}

function updateIndex(visibleIds) {
  const items = document.querySelectorAll('#indexList li');
  items.forEach(li => {
    const link = li.querySelector('a');
    if (!link) return;
    const href = link.getAttribute('href');
    const idMatch = href && href.match(/r(\d+)/);
    if (!idMatch) return;
    const idx = parseInt(idMatch[1]);
    
    if (visibleIds.includes(idx)) {
      li.classList.remove('hidden');
    } else {
      li.classList.add('hidden');
    }
  });
  
  // Update expand button
  const visibleCount = document.querySelectorAll('#indexList li:not(.hidden)').length;
  const btn = document.getElementById('expandBtn');
  if (indexExpanded) {
    btn.textContent = '收起 ▴';
  } else {
    if (visibleCount > INDEX_PREVIEW) {
      btn.textContent = `展开全部 ${getSortedRecipes().length} 道 ▾`;
      btn.style.display = 'block';
      // Hide items beyond preview
      document.querySelectorAll('#indexList li:not(.hidden)').forEach((li, i) => {
        if (i >= INDEX_PREVIEW) li.classList.add('hidden');
      });
    } else {
      btn.style.display = visibleCount > INDEX_PREVIEW ? 'block' : 'none';
    }
  }
}


function updateSummary(visibleCount, query) {
  const countEl = document.getElementById('summaryCount');
  const metaEl = document.getElementById('summaryMeta');
  const noteEl = document.getElementById('summaryNote');
  if (!countEl || !metaEl || !noteEl) return;
  countEl.textContent = `${visibleCount} 道菜谱`;
  const sortLabel = activeSort === 'date' ? '发帖时间倒序' : activeSort === 'likes' ? '点赞最多' : '按阶段排列';
  const tagLabel = activeTag === '全部' ? '全部阶段' : activeTag;
  metaEl.textContent = `${DATASET_LABELS[activeDataset] || '全部数据'} · ${tagLabel} · ${sortLabel}`;
  noteEl.textContent = query ? `正在搜索「${query}」` : '点击目录可跳到菜谱，卡片可单独展开或收起';
}

function quickPreset(tag) {
  const nextTag = tag || '全部';
  const btn = document.querySelector(`.filter-tag[data-tag="${nextTag}"]`);
  if (btn) setTag(nextTag, btn);
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── Actions ──
function setDataset(dataset, btn) {
  activeDataset = dataset;
  document.querySelectorAll('.dataset-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  indexExpanded = false;
  renderAll();
  applyAllFilters();
  window.scrollTo({top:0, behavior:'smooth'});
}

function setTag(tag, btn) {
  activeTag = tag;
  document.querySelectorAll('.filter-tag').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  indexExpanded = false;
  applyAllFilters();
}

function setSort(sort, btn) {
  activeSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
  applyAllFilters();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  applyAllFilters();
}

function scrollToRecipe(hash, updateHash = true) {
  const target = document.querySelector(hash);
  if (!target) return;
  const card = target.closest('.recipe-card');
  if (card) card.classList.remove('collapsed');
  target.scrollIntoView({behavior:'smooth', block:'start'});
  if (updateHash) history.pushState(null, '', hash);
}

function toggleIndex() {
  indexExpanded = !indexExpanded;
  const btn = document.getElementById('expandBtn');
  const items = document.querySelectorAll('#indexList li');
  const visibleItems = document.querySelectorAll('#indexList li:not(.hidden)');
  
  if (indexExpanded) {
    // Show all
    items.forEach(li => li.classList.remove('hidden'));
    btn.textContent = '收起 ▴';
  } else {
    // Show only first 15 amongst visible (excluding search-hidden)
    let shown = 0;
    items.forEach(li => {
      if (!li.classList.contains('hidden')) {
        // This is a visible item (not search-hidden), check if beyond preview
        if (shown >= INDEX_PREVIEW) {
          li.classList.add('hidden');
        }
        shown++;
      }
    });
    btn.textContent = `展开全部 ${getSortedRecipes().length} 道 ▾`;
  }
}

// ── Render ──
function renderAll() {
  renderIndex();
  renderCards();
}

function renderIndex() {
  const sorted = getSortedRecipes();
  const container = document.getElementById('indexList');
  container.innerHTML = sorted.map((r, i) => {
    const escTitle = escapeHTML(r.short_title || r.title.substring(0, 35));
    return `<li>
      <span class="idx">${i+1}</span>
      <a href="#r${i}">${escTitle}</a>
      <span class="idx-badge ${r.stage}">${r.stage_label}</span>
    </li>`;
  }).join('');
}

function renderCards() {
  const sorted = getSortedRecipes();
  const container = document.getElementById('recipeContainer');
  
  container.innerHTML = sorted.map((r, i) => {
    const collapsedClass = allCardsCollapsed ? ' collapsed' : '';
    let html = `<article class="recipe-card${collapsedClass}" id="card-${i}">
  <div class="card-header" onclick="toggleCard(${i})" role="button" tabindex="0" aria-label="展开或收起 ${escapeHTML(r.title)}">
    <div class="card-num" id="r${i}">${i+1}</div>
    <div class="card-title">${escapeHTML(r.title)}</div>
    <span class="toggle-card" aria-hidden="true">⌄</span>
  </div>
  <div class="meta-row">
    <span class="time-badge bg-${r.stage}">${r.stage_label}</span>
    ${r.publish_date ? `<span class="time-badge bg-gen">发布 ${r.publish_date}</span>` : ''}
    ${r.source_batch === 'older_2023_12_14_before' ? `<span class="time-badge source-badge old">新增老帖</span>` : ''}
    ${r.likes_num ? `<span class="time-badge bg-gen">${formatLikes(r.likes_num)} 赞</span>` : ''}
  </div>
  <div class="card-body">`;
    
    if (r.ingredients && r.ingredients.length) {
      html += '\n    <div class="section-label">原料</div>';
      r.ingredients.forEach(ing => {
        html += `\n    <div class="section-content"><p>${escapeHTML(ing)}</p></div>`;
      });
    }
    
    if (r.methods && r.methods.length) {
      html += '\n    <div class="section-label">做法</div>';
      html += '\n    <ol class="method-steps">';
      r.methods.forEach(m => {
        html += `\n      <li>${escapeHTML(m)}</li>`;
      });
      html += '\n    </ol>';
    }
    
    html += '\n  </div>\n</article>';
    return html;
  }).join('');
}

function toggleCard(i) {
  const card = document.getElementById('card-' + i);
  if (card) card.classList.toggle('collapsed');
}

function toggleAllCards() {
  allCardsCollapsed = !allCardsCollapsed;
  document.querySelectorAll('.recipe-card').forEach(card => {
    card.classList.toggle('collapsed', allCardsCollapsed);
  });
  const btn = document.getElementById('collapseAllBtn');
  if (btn) btn.textContent = allCardsCollapsed ? '展开全部' : '收起全部';
}

function formatLikes(n) {
  if (!n) return '0';
  return n >= 10000 ? `${Math.round(n / 10000)}万` : String(n);
}

// ── Utils ──
function escapeHTML(str) {
  str = String(str || '');
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ── Start ──
init();
</script>

</body>
</html>
